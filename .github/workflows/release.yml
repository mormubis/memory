name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  check:
    name: Check version
    outputs:
      changed: ${{ steps.check.outputs.changed }}
      version: ${{ steps.check.outputs.version }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - id: check
        uses: EndBug/version-check@v2
        continue-on-error: true
        with:
          diff-search: true

  lint:
    name: Lint
    uses: ./.github/workflows/lint.yml

  test:
    name: Test
    uses: ./.github/workflows/test.yml

  release:
    name: Release
    permissions:
      id-token: write
      contents: write
    runs-on: ubuntu-latest
    needs: [check, lint, test]
    if:
      needs.check.outputs.changed == 'true' || github.event_name ==
      'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          cache: 'pnpm'
          node-version: 'node'
          registry-url: 'https://registry.npmjs.org'
          scope: '@mormubis'

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Publish
        run: pnpm publish --access public --provenance --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: GitHub Release
        run: |
          VERSION="${{ needs.check.outputs.version }}"
          NOTES=$(awk -v ver="$VERSION" '/^## /{if(found)exit;v=$2;gsub(/[\[\]]/,"",v);if(v==ver){found=1;next}}found{print}' CHANGELOG.md)
          gh release create "v${VERSION}" --title "v${VERSION}" --notes "${NOTES:-Release v${VERSION}}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
